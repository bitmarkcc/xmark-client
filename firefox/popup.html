<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #1E1E2E;
      --surface: #313244;
      --border: #45475A;
      --text: #CDD6F4;
      --muted: #A6ADC8;
      --green: #A6E3A1;
    }
    * { box-sizing: border-box; }
    body {
      width: 340px;
      margin: 0;
      padding: 26px 22px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }
    h1 { font-size: 30px; margin: 0 0 6px; font-weight: 600; }
    p.desc { font-size: 18px; color: var(--muted); margin: 0 0 26px; }

    .toggle-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .switch { position: relative; display: inline-block; width: 124px; height: 64px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 64px;
      transition: background .2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 50px;
      width: 50px;
      left: 6px;
      top: 6px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .switch input:checked + .slider { background: var(--green); border-color: var(--green); }
    .switch input:checked + .slider::before { transform: translateX(60px); }
    .toggle-state { font-size: 24px; font-weight: 600; color: var(--muted); }
    #status { margin-top: 22px; font-size: 22px; color: var(--green); min-height: 26px; }
  </style>
</head>
<body>
  <h1>Xmark</h1>
  <p class="desc">Mark your public X posts to nostr and the Bitmark blockchain.</p>

  <div class="toggle-row">
    <label class="switch">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
    <span class="toggle-state" id="toggle-state">Off</span>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
